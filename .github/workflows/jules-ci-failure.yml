name: Jules - CI failure

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  invoke-jules:
    name: Invoke Jules for trusted CI failure
    if: >-
      vars.JULES_AUTOMATION_ENABLED == 'true' &&
      vars.JULES_ALLOWED_ACTOR != '' &&
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_repository.full_name == github.repository &&
      github.event.workflow_run.actor.login == vars.JULES_ALLOWED_ACTOR
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Validate starting branch
        env:
          STARTING_BRANCH: ${{ github.event.workflow_run.head_branch }}
        shell: bash
        run: |
          set -euo pipefail
          allowed='^(main|task-[a-z0-9][a-z0-9-]*|fix-[a-z0-9][a-z0-9-]*)$'
          if [[ ! "$STARTING_BRANCH" =~ $allowed ]]; then
            echo "Refusing untrusted branch: $STARTING_BRANCH" >&2
            exit 1
          fi

      - name: Create Jules session
        uses: google-labs-code/jules-action@bff7875eaa123cac6742b7cfc51005b95ba4d566 # v1.0.0
        with:
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          starting_branch: ${{ github.event.workflow_run.head_branch }}
          prompt: |
            Diagnose and repair one trusted CI failure with the smallest safe change.

            Workflow: ${{ github.event.workflow_run.name }}
            Run: ${{ github.event.workflow_run.html_url }}
            Branch: ${{ github.event.workflow_run.head_branch }}
            Commit: ${{ github.event.workflow_run.head_sha }}

            Constraints:
            - Read and follow .agents/workflows/GIT_FLOW.md and .github/JULES_AUTOMATION.md.
            - Determine the root cause before editing.
            - Do not weaken a valid test or security check.
            - Do not modify secrets, credentials, or repository permissions.
            - Change workflow files only when the workflow itself is the root cause.
            - Add a regression test when technically possible.
            - Create a pull request; never merge it.
