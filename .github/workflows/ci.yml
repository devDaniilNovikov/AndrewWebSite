name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - main
      - "task-*"
      - "fix-*"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  repository-policy:
    name: Repository policy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate source branch name
        if: github.event_name != 'workflow_dispatch'
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          allowed='^(main|task-[a-z0-9][a-z0-9-]*|fix-[a-z0-9][a-z0-9-]*)$'
          if [[ ! "$BRANCH_NAME" =~ $allowed ]]; then
            echo "Unsupported branch name: $BRANCH_NAME" >&2
            exit 1
          fi

      - name: Validate pull request title
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        shell: bash
        run: |
          set -euo pipefail
          conventional='^(feat|fix|docs|test|refactor|perf|chore|ci)(\([a-z0-9._/-]+\))?!?: .+'
          if [[ ! "$PR_TITLE" =~ $conventional ]]; then
            echo "PR title must follow Conventional Commits." >&2
            exit 1
          fi

      - name: Install actionlint
        env:
          ACTIONLINT_VERSION: "1.7.12"
          ACTIONLINT_SHA256: "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8"
        shell: bash
        run: |
          set -euo pipefail
          archive="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          archive_path="$RUNNER_TEMP/$archive"
          url="https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/$archive"
          curl --proto '=https' --tlsv1.2 --fail --silent --show-error --location \
            --output "$archive_path" "$url"
          printf '%s  %s\n' "$ACTIONLINT_SHA256" "$archive_path" | sha256sum --check --status
          tar -xzf "$archive_path" -C "$RUNNER_TEMP" actionlint
          "$RUNNER_TEMP/actionlint" -version

      - name: Validate GitHub Actions workflows
        shell: bash
        run: |
          "$RUNNER_TEMP/actionlint" -color

      - name: Scan repository for secrets
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up Temurin 25
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      - name: Verify
        run: ./mvnw -B verify

  dependency-security-prep:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    concurrency:
      group: odc-data-writer-Linux-X64-ODC12.2.2-H2-2.4.240-NVDJSON2.0-salt1
      cancel-in-progress: false
    outputs:
      cache_key: ${{ steps.cache-key-gen.outputs.cache_key }}
    steps:
      - name: Generate Cache Key
        id: cache-key-gen
        run: |
          printf "cache_key=odc-pr-Linux-X64-ODC12.2.2-H2-2.4.240-NVDJSON2.0-salt1-pr%s-%s-%s-%s\n" \
            "${{ github.event.pull_request.number }}" \
            "${{ github.event.pull_request.head.sha }}" \
            "${{ github.run_id }}" \
            "${{ github.run_attempt }}" >> "$GITHUB_OUTPUT"
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Set up Temurin 25
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      - name: Restore ODC cache
        uses: actions/cache/restore@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ${{ github.workspace }}/.odc-data
          key: ${{ steps.cache-key-gen.outputs.cache_key }}
          restore-keys: |
            odc-pr-Linux-X64-ODC12.2.2-H2-2.4.240-NVDJSON2.0-salt1-pr${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}-
            odc-pr-Linux-X64-ODC12.2.2-H2-2.4.240-NVDJSON2.0-salt1-pr${{ github.event.pull_request.number }}-
            odc-main-Linux-X64-ODC12.2.2-H2-2.4.240-NVDJSON2.0-salt1-
      - name: Update ODC database
        run: |
          ./mvnw -B dependency-check:update-only \
            "-DdataDirectory=${GITHUB_WORKSPACE}/.odc-data" \
            "-DnvdDatafeedUrl=https://nvd.nist.gov/feeds/json/cve/2.0/nvdcve-2.0-{0}.json.gz"
      - name: Validate H2 Database
        run: |
          if [ ! -s "${GITHUB_WORKSPACE}/.odc-data/odc.mv.db" ]; then
            echo "ODC H2 database is empty or missing." >&2
            exit 1
          fi
      - name: Save ODC cache
        uses: actions/cache/save@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        if: success()
        with:
          path: ${{ github.workspace }}/.odc-data
          key: ${{ steps.cache-key-gen.outputs.cache_key }}

  dependency-security:
    if: always() && github.event_name == 'pull_request'
    needs: dependency-security-prep
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Require prep success
        run: |
          if [ "${{ needs.dependency-security-prep.result }}" != "success" ]; then
            echo "Dependency prep did not succeed." >&2
            exit 1
          fi
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Set up Temurin 25
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      - name: Restore exactly prepped ODC cache
        uses: actions/cache/restore@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ${{ github.workspace }}/.odc-data
          key: ${{ needs.dependency-security-prep.outputs.cache_key }}
          fail-on-cache-miss: true
      - name: Validate H2 Database
        run: |
          if [ ! -s "${GITHUB_WORKSPACE}/.odc-data/odc.mv.db" ]; then
            echo "ODC H2 database is empty or missing." >&2
            exit 1
          fi
      - name: Scan dependencies for known vulnerabilities
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          ./mvnw -B dependency-check:check \
            "-DdataDirectory=${GITHUB_WORKSPACE}/.odc-data" \
            "-DautoUpdate=false"

  java-security:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Initialize CodeQL for Java
        uses: github/codeql-action/init@b7351df727350dca84cb9d725d57dcf5bc82ba26 # v3.37.1
        with:
          languages: java-kotlin
      - name: Set up Temurin 25
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      - name: Build for analysis
        run: ./mvnw -B -DskipTests package
      - name: Analyze
        uses: github/codeql-action/analyze@b7351df727350dca84cb9d725d57dcf5bc82ba26 # v3.37.1
