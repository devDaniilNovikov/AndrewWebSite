name: ODC Prewarm

on:
  schedule:
    - cron: '0 2 * * *' # Run daily at 02:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prewarm-odc:
    name: Prewarm Dependency-Check Database
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Set up Temurin 25
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Restore ODC data directory cache
        uses: actions/cache/restore@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: ${{ github.workspace }}/.odc-data
          key: odc-${{ runner.os }}-${{ runner.arch }}-odc12.2.2-h2-2.4.240-schema1-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            odc-${{ runner.os }}-${{ runner.arch }}-odc12.2.2-h2-2.4.240-schema1-

      - name: Update ODC database
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: ./mvnw -B dependency-check:update-only -DdataDirectory=${{ github.workspace }}/.odc-data

      - name: Save ODC data directory cache
        uses: actions/cache/save@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: ${{ github.workspace }}/.odc-data
          key: odc-${{ runner.os }}-${{ runner.arch }}-odc12.2.2-h2-2.4.240-schema1-${{ github.run_id }}-${{ github.run_attempt }}
