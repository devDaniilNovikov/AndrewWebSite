name: ODC Prewarm

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: odc-data-writer-Linux-X64-ODC12.2.2-H2-2.4.240-NVDJSON2.0-salt1
  cancel-in-progress: false

jobs:
  prewarm:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Set up Temurin 25
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Restore ODC cache
        uses: actions/cache/restore@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ${{ github.workspace }}/.odc-data
          key: odc-main-Linux-X64-ODC12.2.2-H2-2.4.240-NVDJSON2.0-salt1-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            odc-main-Linux-X64-ODC12.2.2-H2-2.4.240-NVDJSON2.0-salt1-

      - name: Update ODC database
        run: |
          ./mvnw -B dependency-check:update-only \
            "-DdataDirectory=${GITHUB_WORKSPACE}/.odc-data" \
            "-DnvdDatafeedUrl=https://nvd.nist.gov/feeds/json/cve/2.0/nvdcve-2.0-{0}.json.gz"

      - name: Validate H2 Database
        run: |
          if [ ! -s "${GITHUB_WORKSPACE}/.odc-data/odc.mv.db" ]; then
            echo "ODC H2 database is empty or missing." >&2
            exit 1
          fi

      - name: Save ODC cache
        uses: actions/cache/save@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        if: success()
        with:
          path: ${{ github.workspace }}/.odc-data
          key: odc-main-Linux-X64-ODC12.2.2-H2-2.4.240-NVDJSON2.0-salt1-${{ github.run_id }}-${{ github.run_attempt }}
