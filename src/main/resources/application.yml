spring:
  application:
    name: andrew-website
  autoconfigure:
    exclude: org.springframework.boot.security.autoconfigure.UserDetailsServiceAutoConfiguration
  mvc:
    problemdetails:
      enabled: true
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    baseline-on-migrate: false
    clean-disabled: true
  jackson:
    datatype:
      enum:
        fail-on-numbers-for-enums: true
    deserialization:
      fail-on-unknown-properties: true
    mapper:
      allow-coercion-of-scalars: false
app:
  web:
    max-request-bytes: 16384
    rate-limit:
      enabled: true
      max-clients: 10000
      client-idle-ttl: 1h
      global-limit: 60
      global-window: 1m
      client-capacity: 5
      client-refill: 1m
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState
server:
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
